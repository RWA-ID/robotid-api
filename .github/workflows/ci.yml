name: CI

# §9.4 CI matrix:
#  - every push: forge test (unit) + lint + typecheck
#  - before deploy: forked-mainnet integration suite + oem-quickstart.sh on a staging fork
#  - block deploy on any failure

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts-unit:
    name: Contracts · forge test (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge --version
      - run: forge build --sizes
      - run: forge fmt --check
      - run: forge test -vv

  js-typecheck:
    name: JS · typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  integration:
    name: Forked-mainnet integration (deploy gate)
    runs-on: ubuntu-latest
    # gate: only run on main (pre-deploy) — needs the Alchemy fork key
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Forked-mainnet integration suite
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
        run: FOUNDRY_PROFILE=integration forge test -vv

  smoke:
    name: API smoke (oem-quickstart.sh)
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Boot API against staging fork + smoke
        env:
          RPC_URL: ${{ secrets.STAGING_RPC_URL }}
          SUBSCRIPTION_ADDRESS: ${{ secrets.STAGING_SUBSCRIPTION_ADDRESS }}
        run: |
          npm --workspace api run build
          (npm --workspace api run start &) && sleep 4
          API_URL=http://localhost:3001 bash api/src/scripts/oem-quickstart.sh
